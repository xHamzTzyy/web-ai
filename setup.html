<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAREUU AI — Setup Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Sora', sans-serif;
  background: #0a0b0e; color: #e8eaf0;
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: #111318; border: 1px solid #252b38;
  border-radius: 18px; padding: 36px;
  width: min(480px, 100%);
}
.logo {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg,#f97316,#fbbf24);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: white; margin-bottom: 18px;
  box-shadow: 0 0 32px rgba(249,115,22,0.3);
}
h1 { font-size: 20px; margin-bottom: 4px; }
.subtitle { font-size: 12.5px; color: #6b7280; margin-bottom: 28px; line-height: 1.5; }
.warn {
  background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.3);
  border-radius: 10px; padding: 12px 14px;
  font-size: 12px; color: #fbbf24; margin-bottom: 22px; line-height: 1.6;
}
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11.5px; color: #9ca3af; margin-bottom: 6px; }
.field input {
  width: 100%; background: #181c23;
  border: 1px solid #252b38; border-radius: 10px;
  color: #e8eaf0; font-family: 'Sora', sans-serif;
  font-size: 14px; padding: 11px 14px;
  outline: none; transition: border-color .2s;
}
.field input:focus { border-color: #f97316; }
.btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg,#f97316,#fbbf24);
  border: none; border-radius: 10px; color: white;
  font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 6px;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.result {
  margin-top: 20px; background: #181c23;
  border: 1px solid #252b38; border-radius: 10px; padding: 14px;
  font-size: 12.5px; display: none;
}
.result.ok { border-color: #34d399; }
.result.err { border-color: #f87171; }
.result-title { font-weight: 700; margin-bottom: 6px; }
.result-title.ok { color: #34d399; }
.result-title.err { color: #f87171; }
.hash-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #6b7280; word-break: break-all;
  margin-top: 6px;
}
.divider { border: none; border-top: 1px solid #252b38; margin: 24px 0; }
.list-admins { margin-top: 0; }
.list-admins h3 { font-size: 13px; color: #9ca3af; margin-bottom: 10px; }
.admin-entry {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: 8px;
  background: #181c23; border: 1px solid #252b38;
  margin-bottom: 6px; font-size: 13px;
}
.del-btn {
  background: none; border: none; color: #6b7280;
  cursor: pointer; font-size: 13px; padding: 2px 6px;
  border-radius: 5px; transition: color .2s;
}
.del-btn:hover { color: #f87171; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><i class="fa-solid fa-key"></i></div>
  <h1>Setup Admin Credentials</h1>
  <p class="subtitle">Tool ini untuk menambah / menghapus akun admin di Firebase.<br>Gunakan sekali, lalu hapus file ini dari server.</p>

  <div class="warn">
    ⚠️ <strong>Keamanan:</strong> Password di-hash SHA-256 sebelum disimpan. Firebase hanya menyimpan hash — plain text password tidak pernah tersimpan.
  </div>

  <div class="field">
    <label>Username Admin</label>
    <input type="text" id="setupUser" placeholder="Contoh: admin" autocomplete="off">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="setupPass" placeholder="Minimal 8 karakter">
  </div>
  <div class="field">
    <label>Konfirmasi Password</label>
    <input type="password" id="setupPass2" placeholder="Ulangi password">
  </div>
  <button class="btn" onclick="setupAdmin()" id="setupBtn">
    <i class="fa-solid fa-cloud-arrow-up"></i> Simpan ke Firebase
  </button>

  <div class="result" id="result">
    <div class="result-title" id="resultTitle"></div>
    <div id="resultMsg"></div>
    <div class="hash-val" id="resultHash"></div>
  </div>

  <hr class="divider">

  <div class="list-admins">
    <h3><i class="fa-solid fa-users-gear" style="color:#f97316;margin-right:6px"></i>Admin yang Terdaftar</h3>
    <div id="adminList" style="color:#6b7280;font-size:12px">Memuat...</div>
    <button class="btn" onclick="loadAdminList()" style="margin-top:12px;background:#181c23;border:1px solid #252b38;color:#9ca3af;font-size:12px;padding:9px">
      <i class="fa-solid fa-arrows-rotate"></i> Refresh Daftar
    </button>
  </div>
</div>

<script>
const FIREBASE_DB_URL = 'https://user-e9bb1-default-rtdb.asia-southeast1.firebasedatabase.app';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function showResult(ok, title, msg, hash) {
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.className = 'result ' + (ok ? 'ok' : 'err');
  const titleEl = document.getElementById('resultTitle');
  titleEl.className = 'result-title ' + (ok ? 'ok' : 'err');
  titleEl.textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultHash').textContent = hash ? 'SHA-256: ' + hash : '';
}

async function setupAdmin() {
  const u = document.getElementById('setupUser').value.trim();
  const p = document.getElementById('setupPass').value;
  const p2 = document.getElementById('setupPass2').value;

  if (!u) return showResult(false, 'Error', 'Username wajib diisi.', '');
  if (u.length < 3) return showResult(false, 'Error', 'Username minimal 3 karakter.', '');
  if (/[.#$\[\]]/.test(u)) return showResult(false, 'Error', 'Username tidak boleh mengandung karakter: . # $ [ ]', '');
  if (p.length < 8) return showResult(false, 'Error', 'Password minimal 8 karakter.', '');
  if (p !== p2) return showResult(false, 'Error', 'Konfirmasi password tidak cocok.', '');

  const btn = document.getElementById('setupBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...';

  try {
    // Hash: SHA-256(username:password) — salt sederhana pakai username
    const hash = await sha256(u + ':' + p);

    const res = await fetch(`${FIREBASE_DB_URL}/admin_accounts/${u}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        passwordHash: hash,
        createdAt: new Date().toISOString()
      })
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    showResult(true, '✓ Berhasil!', `Akun admin "${u}" berhasil disimpan ke Firebase.`, hash);
    document.getElementById('setupUser').value = '';
    document.getElementById('setupPass').value = '';
    document.getElementById('setupPass2').value = '';
    loadAdminList();
  } catch(e) {
    showResult(false, '✗ Gagal', 'Tidak bisa menyimpan ke Firebase: ' + e.message, '');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan ke Firebase';
}

async function loadAdminList() {
  const el = document.getElementById('adminList');
  el.innerHTML = '<span style="color:#6b7280;font-size:12px">Memuat...</span>';
  try {
    const res = await fetch(`${FIREBASE_DB_URL}/admin_accounts.json`);
    const data = await res.json();
    if (!data) {
      el.innerHTML = '<span style="color:#6b7280;font-size:12px">Belum ada admin terdaftar</span>';
      return;
    }
    const entries = Object.entries(data);
    el.innerHTML = entries.map(([name, val]) => `
      <div class="admin-entry">
        <div>
          <span style="font-weight:600">${escHtml(name)}</span>
          <span style="font-size:11px;color:#6b7280;margin-left:8px">Dibuat: ${val.createdAt ? new Date(val.createdAt).toLocaleDateString('id-ID') : '—'}</span>
        </div>
        <button class="del-btn" onclick="deleteAdmin('${escHtml(name)}')" title="Hapus admin ini">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<span style="color:#f87171;font-size:12px">Gagal memuat: ' + e.message + '</span>';
  }
}

async function deleteAdmin(username) {
  if (!confirm(`Hapus akun admin "${username}"?`)) return;
  try {
    const res = await fetch(`${FIREBASE_DB_URL}/admin_accounts/${username}.json`, { method: 'DELETE' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    showResult(true, '✓ Dihapus', `Akun admin "${username}" berhasil dihapus.`, '');
    loadAdminList();
  } catch(e) {
    showResult(false, '✗ Gagal hapus', e.message, '');
  }
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Load list on start
loadAdminList();
</script>
</body>
</html>
